name: deploy

# Build the wasm pkg and publish web/ to GitHub Pages on every push to main.
# Requires Pages to be set to "GitHub Actions" in the repo settings.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build crates/wasm --target web --release --out-dir ../../web/pkg
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - uses: actions/deploy-pages@v4
        id: deployment
