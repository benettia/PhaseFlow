name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: rust — fmt, clippy, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy -p phase-core -p phase-scenario -p phase-flow-wasm --all-targets --release -- -D warnings
      - run: cargo test -p phase-core --release

  wasm:
    name: wasm — pkg builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build crates/wasm --target web --release --out-dir ../../web/pkg

  python:
    name: python — ruff + verification suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check analysis/
      - run: uv run ruff format --check analysis/
      # web/pkg is gitignored — the smoke test needs a freshly built wasm pkg
      - run: curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - run: wasm-pack build crates/wasm --target web --release --out-dir ../../web/pkg
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - run: uv run playwright install --with-deps chromium
      # full acceptance: faucet convergence, shock tube, severe-slugging
      # limit cycle (~40 s), valve slam, headless web smoke
      - run: uv run pytest -q

  changelog-discipline:
    name: CLAUDE.md changelog updated
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: require a CLAUDE.md changelog entry on every PR
        run: |
          if git diff --name-only "origin/${{ github.base_ref }}"...HEAD | grep -qx "CLAUDE.md"; then
            echo "CLAUDE.md updated — thank you."
          else
            echo "::error::This PR does not update CLAUDE.md."
            echo "The changelog discipline requires every PR to append an entry:"
            echo "what changed, what was tried and rejected, considerations for future agents."
            exit 1
          fi
