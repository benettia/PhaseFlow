# Install once: uv run pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  # Ruff runs through uv so pre-commit and CI use the SAME ruff — the one
  # pinned in uv.lock. A separately-versioned ruff-pre-commit hook drifts
  # from the dev dependency and the two formatters then fight over the same
  # files (0.8 and 0.15 wrap long assert messages differently), so every
  # commit reformats and CI rejects it.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all --
        language: system
        types: [rust]
        pass_filenames: false
      - id: claude-md-reminder
        name: CLAUDE.md changelog reminder
        entry: >
          bash -c 'if git diff --cached --name-only | grep -qE "\.(rs|js|py|html|toml)$"
          && ! git diff --cached --name-only | grep -qx CLAUDE.md; then
          echo ""; echo "⚠  Code changed but CLAUDE.md was not updated."
          echo "   The changelog discipline (see CLAUDE.md) requires every PR to append"
          echo "   an entry with what changed and considerations for future agents."
          echo "   This is a reminder, not a block — CI will enforce it on the PR."; fi;
          exit 0'
        language: system
        pass_filenames: false
